<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance Guide Hub – Latest Loan Articles</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f7fb;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#007bff,#00c6ff);
  padding:15px;
  text-align:center;
  color:#fff;
  font-size:22px;
  font-weight:bold;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* 3D CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  text-decoration:none;
  color:#000;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  transform:translateY(0);
  transition:0.3s;
  perspective:1000px;
}

.card:hover{
  transform:translateY(-8px) rotateX(5deg) rotateY(5deg);
  box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

/* AD BOX */
.ad-box{
  background:#eee;
  padding:20px;
  text-align:center;
  margin:25px 0;
  border-radius:10px;
  font-weight:bold;
}

/* TITLE */
h1{
  text-align:center;
  color:#007bff;
}
</style>

</head>

<body>

<header>
Finance Guide Hub
</header>

<div class="container">

<h1>Latest Finance & Loan Articles</h1>

<!-- AD 1 -->
<div class="ad-box">Ad Space</div>

<div class="grid" id="postList"></div>

<!-- AD 2 -->
<div class="ad-box">Ad Space</div>

<!-- AD 3 -->
<div class="ad-box">Ad Space</div>

</div>

<script>

// ALL POSTS (FIXED LINKS)
const posts = [
"/articles/instant-personal-loan-online-india.html",
"/articles/best-credit-card-for-beginners-india.html",
"/articles/home-loan-with-low-interest-rates-2026.html",
"/articles/instant-business-loan-without-collateral.html",
"/articles/improve-credit-score-fast-india.html",
"/articles/emergency-loan-online-instant-approval.html",
"/articles/same-day-payday-loan-online.html",
"/articles/business-loan-without-collateral-india.html",
"/articles/student-loan-without-guarantor-india.html",
"/articles/best-loan-apps-india-instant-cash.html",
"/articles/guaranteed-approval-loans-bad-credit-truth.html",
"/articles/latest-home-loan-interest-rates-india-2026.html",
"/articles/car-loan-zero-down-payment-india.html",
"/articles/instant-approval-credit-cards-india.html",
"/articles/loan-against-salary-instant-approval.html",
"/articles/personal-loan-emi-calculator-guide.html",
"/articles/online-loan-for-unemployed-india.html",
"/articles/gold-loan-interest-rate-today-india.html",
"/articles/low-interest-personal-loan-online-india.html",
"/articles/fast-cash-loan-without-documents.html"
];

// RENDER CARDS
let list = document.getElementById("postList");

posts.forEach(link => {

  let title = link
    .replace("/articles/","")
    .replace(".html","")
    .replace(/-/g," ");

  let a = document.createElement("a");
  a.href = link;
  a.className = "card";
  a.innerText = title;

  list.appendChild(a);
});

</script>
<footer style="text-align:center;padding:15px;background:linear-gradient(90deg,#007bff,#00c6ff);color:#fff;margin-top:20px;font-weight:bold;">
  © 2026 Finance Guide Hub | All Rights Reserved
</footer>
</body>
</html>

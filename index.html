<!DOCTYPE html>
<html>
<head>
<title>Finance Guide Hub</title>
<link rel="stylesheet" href="assets/css/style.css">

<style>
ul{list-style:none;padding:0}
li{margin:10px 0;padding:10px;background:#f5f5f5;border-radius:8px}
a{text-decoration:none;color:#000;font-weight:bold}
</style>

</head>

<body>

<header>
  <h2>Finance Guide Hub</h2>
</header>

<div class="container">
  <h1>All Articles</h1>

  <ul id="postList"></ul>

  <div class="ad-box">Ad Space</div>

  <div id="timer">Please wait...</div>
  <button id="btn" disabled onclick="goNext()">Continue</button>

</div>

<script>

// 🔥 ALL POSTS AUTO LIST (based on your folder)
const posts = [
"best-credit-card-for-beginners-india.html",
"best-fast-cash-loan-apps-2026.html",
"best-loan-apps-india-instant-cash.html",
"business-loan-without-collateral-india.html",
"business-loan-without-collateral.html",
"car-loan-zero-down-payment-india.html",
"emergency-loan-online-instant-approval.html",
"fast-cash-loan-without-documents.html",
"gold-loan-interest-rate-today-india.html",
"gold-loan-interest-rates-today.html",
"guaranteed-approval-loans-bad-credit-truth.html",
"home-loan-with-low-interest-rates-2026.html",
"improve-credit-score-fast-india.html",
"instant-approval-credit-cards-india.html",
"instant-business-loan-without-collateral.html",
"instant-personal-loan-online-india.html",
"latest-home-loan-interest-rates-india-2026.html",
"loan-against-salary-instant-approval.html",
"loan-without-cibil-score.html",
"low-interest-personal-loan-online-india.html",
"low-interest-personal-loan-online.html",
"online-loan-for-unemployed-india.html",
"online-loan-for-unemployed.html",
"personal-loan-emi-calculator-guide.html",
"personal-loan-emi-calculator.html",
"same-day-payday-loan-online.html",
"student-loan-without-guarantor-india.html"
];

// 🔥 Render posts
let list = document.getElementById("postList");

posts.forEach(post => {
  let li = document.createElement("li");
  let a = document.createElement("a");

  a.href = "articles/" + post;
  a.innerText = post.replace(".html","").replace(/-/g," ");

  li.appendChild(a);
  list.appendChild(li);
});

// ⏳ Timer
let t = 5;
let timer = document.getElementById("timer");
let btn = document.getElementById("btn");

let x = setInterval(function(){
  timer.innerHTML = "Wait " + t + " sec";
  t--;

  if(t < 0){
    clearInterval(x);
    timer.innerHTML = "Go ahead";
    btn.disabled = false;
  }
},1000);

// 🔁 Redirect
function goNext(){
  window.location.href = "final.html";
}

</script>

</body>
</html>
